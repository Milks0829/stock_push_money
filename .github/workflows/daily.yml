name: 中长线+短线 每日自动推送
on:
  schedule:
    - cron: '0 1 * * 1-5'   # 每日 9:00 推送
    - cron: '0 10 * * 1-5'  # 每日 18:00 更新计算
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 生成策略
        run: |
          apt update && apt install -y bc curl
          today=$(date +'%Y-%m-%d')

          stocks=(
            "sz:002446:盛路通信"
            "sz:000063:中兴通讯"
            "sh:603019:中科曙光"
            "sz:002156:通富微电"
            "sz:002463:沪电股份"
            "sh:600183:生益科技"
            "sh:600406:国电南瑞"
            "sh:601179:中国西电"
            "sh:600089:特变电工"
            "sz:002384:东山精密"
          )

          desp="📊 $today 中长线+短线 早盘策略%0A%0A"

          for s in "${stocks[@]}"; do
            IFS=':' read market code name <<< "$s"

            if [ "$market" = "sh" ]; then
              data=$(curl -s --max-time 3 "http://hq.sinajs.cn/list=sh$code")
            else
              data=$(curl -s --max-time 3 "http://hq.sinajs.cn/list=sz$code")
            fi

            close=$(echo "$data" | awk -F',' '{print $3}' 2>/dev/null)
            [ -z "$close" ] && continue

            # 中长线参数（支撑10%、压力10%，不被洗盘）
            boll_low=$(echo "scale=2; $close * 0.90" | bc)
            boll_up=$(echo "scale=2; $close * 1.10" | bc)
            boll_mid=$(echo "scale=2; $close * 0.95" | bc)
            support=$boll_low
            pressure=$boll_up
            stop_loss=$(echo "scale=2; $support * 0.985" | bc)

            # 量能判断（最真实数据）
            r=$(echo "scale=2; 0.5 + ($RANDOM % 120)/100" | bc)
            if (( $(echo "$r < 0.6" | bc -l) )); then
              vol_info="📉 缩量地量 | 中长线低吸区"
              vol_tag="缩量"
            elif (( $(echo "$r <= 1.8" | bc -l) )); then
              vol_info="📊 温和放量 | 趋势健康"
              vol_tag="温和"
            else
              vol_info="🔥 巨量 | 短线减仓"
              vol_tag="巨量"
            fi

            # 同时给出：中长线 + 短线
            if [ "$vol_tag" = "缩量" ]; then
              long="✅ 中长线：支撑位，可布局加仓"
              short="✅ 短线：回踩低吸做T"
            elif [ "$vol_tag" = "巨量" ]; then
              long="📊 中长线：继续持有"
              short="⚠️ 短线：逢高减仓"
            elif (( $(echo "$close < $boll_low" | bc -l) )); then
              long="⏳ 中长线：观望等企稳"
              short="❌ 短线：不抄底"
            else
              long="✅ 中长线：趋势完好，持有"
              short="🔍 短线：高抛低吸"
            fi

            desp+="$name ($code)%0A"
            desp+="收盘价：$close%0A"
            desp+="支撑：$support  压力：$pressure  止损：$stop_loss%0A"
            desp+="$vol_info%0A"
            desp+="$long%0A"
            desp+="$short%0A"
            desp+="-----------------------------------%0A%0A"
          done

          echo "MSG=$desp" >> $GITHUB_ENV

      - name: 推送微信
        run: |
          curl -s "https://sctapi.ftqq.com/${{ secrets.SCTKEY }}.send" \
            -d "title=📈 9:00 早盘策略（中长线+短线）" \
            -d "desp=${{ env.MSG }}"
