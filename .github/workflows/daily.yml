name: 专业量化分析 - 最终完整版(真指标+主力成本+公告利弊)
on:
  schedule:
    - cron: '0 1 * * 1-5'  # 北京时间9:00
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 安装环境
        run: |
          apt update && apt install -y python3 python3-pip
          pip3 install pandas numpy ta tushare requests

      - name: 运行量化分析
        run: |
          cat > analyze.py << 'EOF'
          import pandas as pd
          import numpy as np
          import ta
          import tushare as ts
          import requests
          from datetime import datetime, timedelta
          import sys
          import time

          # ===================== 强制北京时间 =====================
          utc_now = datetime.utcnow()
          beijing_now = utc_now + timedelta(hours=8)
          today = beijing_now.strftime("%Y-%m-%d")
          weekday = beijing_now.weekday()
          now = beijing_now

          if weekday >= 5:
              print("MSG=今天周末，不推送")
              sys.exit()

          holidays_2026 = {
              "2026-01-01", "2026-01-22", "2026-01-23", "2026-01-24", "2026-01-25",
              "2026-01-26", "2026-01-27", "2026-01-28", "2026-04-05", "2026-04-06",
              "2026-05-01", "2026-05-02", "2026-05-03", "2026-06-19", "2026-06-20",
              "2026-10-01", "2026-10-02", "2026-10-03", "2026-10-04", "2026-10-05",
              "2026-10-06", "2026-10-07"
          }

          if today in holidays_2026:
              print("MSG=今天节假日，不推送")
              sys.exit()

          ###########################################################
          #
          #  在这里填入你的 Tushare Token
          #
          ###########################################################
          ts.set_token("57f868042fd4ef8ffdfd9b29bba61e694514425ec4df2ab07aff96dc")
          pro = ts.pro_api()

          stocks = [
              ("002446.SZ", "盛路通信"),
              ("000063.SZ", "中兴通讯"),
              ("603019.SH", "中科曙光"),
              ("002156.SZ", "通富微电"),
              ("002463.SZ", "沪电股份"),
              ("600183.SH", "生益科技"),
              ("600406.SH", "国电南瑞"),
              ("600089.SH", "特变电工"),
              ("002384.SZ", "东山精密"),
              ("601179.SH", "中国西电")
          ]

          # =============== 公告获取 ===============
          def get_stock_news(code):
              try:
                  code_short = code.split(".")[0]
                  url = "https://www.cninfo.com.cn/new/hisAnnouncement/query"
                  data = {"stock": code_short, "pageSize": 2, "pageNum": 1}
                  headers = {"User-Agent": "Mozilla/5.0"}
                  r = requests.post(url, data=data, headers=headers, timeout=10)
                  data = r.json()
                  return [ann["announcementTitle"] for ann in data.get("announcements", []) if len(ann.get("announcementTitle", "")) > 5][:2]
              except:
                  return []

          def judge_news_good_bad(title):
              good_key = ["预增", "扭亏", "盈利", "中标", "合同", "订单", "增持", "回购", "重组", "收购", "投产", "分红"]
              bad_key = ["亏损", "下降", "减持", "解禁", "立案", "处罚", "退市", "风险", "终止", "违约"]
              if any(k in title for k in good_key):
                  return "✅ 利好"
              elif any(k in title for k in bad_key):
                  return "❌ 利空"
              else:
                  return "ℹ️ 中性"

          # =============== 股票数据获取（Tushare 稳定版） ===============
          def get_stock_data(code, days=60):
              try:
                  end_date = now.strftime("%Y%m%d")
                  start_date = (now - timedelta(days=180)).strftime("%Y%m%d")
                  df = pro.daily(ts_code=code, start_date=start_date, end_date=end_date)
                  df = df.rename(columns={'trade_date':'date','open':'open','close':'close','high':'high','low':'low','vol':'volume'})
                  df['date'] = pd.to_datetime(df['date'], format='%Y%m%d')
                  df = df.sort_values('date').tail(days).reset_index(drop=True)
                  return df
              except:
                  return None

          # =============== 主力成本 VWAP ===============
          def vwap_cost(df):
              try:
                  df20 = df.tail(20)
                  return round((df20['close'] * df20['volume']).sum() / df20['volume'].sum(), 2)
              except:
                  return None

          # =============== 技术指标 ===============
          def indicators(df):
              close = df['close']
              volume = df['volume']
              df['ma5'] = ta.trend.sma_indicator(close, 5)
              df['ma10'] = ta.trend.sma_indicator(close, 10)
              df['ma20'] = ta.trend.sma_indicator(close, 20)
              macd = ta.trend.MACD(close)
              df['macd_line'] = macd.macd()
              df['macd_signal'] = macd.macd_signal()
              df['rsi'] = ta.momentum.rsi(close, 14)
              bb = ta.volatility.BollingerBands(close, 20, 2)
              df['bb_u'] = bb.bollinger_hband()
              df['bb_l'] = bb.bollinger_lband()
              df['vol_ma5'] = volume.rolling(5).mean()
              return df

          # =============== 输出报告 ===============
          output = f"📊 {today} 专业量化报告%0A%0A"

          for code, name in stocks:
              time.sleep(0.5)
              df = get_stock_data(code)
              news_list = get_stock_news(code)

              if df is None or len(df) < 10:
                  output += f"⚠️ {name} 获取失败%0A────────────────%0A"
                  continue

              df = indicators(df)
              vwap = vwap_cost(df)
              d = df.iloc[-1]

              # 趋势
              trend = "震荡"
              if d.close > d.ma5 > d.ma10 > d.ma20:
                  trend = "📈 多头排列"
              elif d.close < d.ma5 < d.ma10 < d.ma20:
                  trend = "📉 空头排列"

              # MACD
              macd_st = "震荡"
              try:
                  if d.macd_line > d.macd_signal and df.iloc[-2].macd_line <= df.iloc[-2].macd_signal:
                      macd_st = "✅ 金叉"
                  elif d.macd_line < d.macd_signal and df.iloc[-2].macd_line >= df.iloc[-2].macd_signal:
                      macd_st = "❌ 死叉"
              except:
                  pass

              # 量能
              vol_st = "正常"
              if d.volume > d.vol_ma5 * 1.5:
                  vol_st = "🔥 放量"
              elif d.volume < d.vol_ma5 * 0.5:
                  vol_st = "📉 缩量"

              # 策略
              if trend == "📈 多头排列" and macd_st == "✅ 金叉":
                  long = "✅ 中长线：持股为主"
                  short = "✅ 短线：逢低关注"
              elif trend == "📉 空头排列" and macd_st == "❌ 死叉":
                  long = "❌ 中长线：谨慎观望"
                  short = "❌ 短线：回避风险"
              elif d.rsi < 30:
                  long = "💰 中长线：超跌机会"
                  short = "💰 短线：反弹可期"
              elif d.rsi > 70:
                  long = "⚠️ 中长线：高估风险"
                  short = "⚠️ 短线：逢高减仓"
              else:
                  long = "📊 中长线：持有观望"
                  short = "📊 短线：区间操作"

              output += f"🔹 {name}%0A"
              output += f"💰 收盘:{round(d.close,2)}%0A"
              output += f"📈 MA5:{round(d.ma5,2)} MA10:{round(d.ma10,2)} MA20:{round(d.ma20,2)}%0A"
              output += f"📊 趋势:{trend} | MACD:{macd_st} | RSI:{round(d.rsi,1)}%0A"
              output += f"🔋 量能:{vol_st}%0A"
              output += f"🛡️ 支撑:{round(d.bb_l,2)} | 阻力:{round(d.bb_u,2)}%0A"

              if vwap:
                  cost_st = "✅ 现价在主力成本之上" if d.close > vwap else "⚠️ 现价在主力成本之下"
                  output += f"💎 主力成本:{vwap} | {cost_st}%0A"

              if news_list:
                  output += "📢 公告：%0A"
                  for t in news_list:
                      output += f"{judge_news_good_bad(t)}：{t}%0A"

              output += f"{long}%0A{short}%0A"
              output += "────────────────%0A%0A"

          print(f"MSG={output}")
          EOF

          python3 analyze.py > output.log
          MSG=$(grep "^MSG=" output.log | head -1)
          echo "$MSG" >> $GITHUB_ENV

      - name: 推送微信
        if: env.MSG != ''
        run: |
          curl -s "https://sctapi.ftqq.com/${{ secrets.SCTKEY }}.send" \
          -d "title=📈 A股专业量化报告" -d "desp=${MSG}"
