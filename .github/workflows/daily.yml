name: 10只股票自动推送微信
on:
  schedule:
    - cron: '25 1 * * 1-5'  # 北京时间 周一~周五 9:25 (UTC时间 1:25)
  workflow_dispatch:         # 允许手动点击触发测试

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 发送股票盯盘表至微信
        run: |
          curl -X POST "https://sctapi.ftqq.com/${{ secrets.SCTKEY }}.send" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "title=📈 9:25 股票盯盘表" \
          -d "desp=1.盛路通信 002446%0A现价：10.52  支撑：10.2/9.8  压力：11.0/11.5  止损：10.0%0A操作：回踩低吸，破10止损%0A%0A2.中兴通讯 000063%0A现价：36.46  支撑：35.7/34.8  压力：37.0/38.0  止损：36.0%0A操作：35.7附近低吸%0A%0A3.中科曙光 603019%0A现价：89.10  支撑：88.0/86.0  压力：91.0/93.0  止损：88.0%0A操作：87下方低吸%0A%0A4.通富微电 002156%0A现价：45.86  支撑：45.0/43.5  压力：47.0/48.5  止损：45.0%0A操作：观望企稳再进%0A%0A5.沪电股份 002463%0A现价：81.18  支撑：79.6/78.0  压力：84.0/86.0  止损：79.6%0A操作：80附近低吸%0A%0A6.生益科技 600183%0A现价：63.44  支撑：62.0/60.5  压力：65.0/67.0  止损：62.0%0A操作：62附近低吸%0A%0A7.国电南瑞 600406%0A现价：29.21  支撑：28.5/28.0  压力：30.0/31.5  止损：28.0%0A操作：28.5附近低吸%0A%0A8.中国西电 601179%0A现价：17.65  支撑：17.3/16.5  压力：18.0/19.0  止损：17.3%0A操作：暂不抄底%0A%0A9.特变电工 600089%0A现价：30.32  支撑：30.0/29.6  压力：31.0/32.0  止损：29.6%0A操作：30附近低吸%0A%0A10.东山精密 002384%0A现价：110.93  支撑：108.5/105.0  压力：119.0/125.0  止损：105.0%0A操作：108-109低吸"
