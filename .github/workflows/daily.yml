name: 专业量化分析 - 最终完整版(真指标+主力成本+公告利弊)
on:
  schedule:
    - cron: '0 1 * * 1-5'  # UTC 1:00 = 北京时间 9:00
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 安装环境
        run: |
          apt update && apt install -y python3 python3-pip
          pip3 install pandas numpy ta akshare requests

      - name: 运行量化+主力成本+公告分析
        run: |
          cat > analyze.py << 'EOF'
          import pandas as pd
          import numpy as np
          import ta
          import akshare as ak
          import requests
          from datetime import datetime, timedelta
          import sys
          import time

          # ===================== 强制北京时间 =====================
          utc_now = datetime.utcnow()
          beijing_now = utc_now + timedelta(hours=8)
          today = beijing_now.strftime("%Y-%m-%d")
          weekday = beijing_now.weekday()
          now = beijing_now

          if weekday >= 5:
              print("今天周末，不推送")
              sys.exit()

          holidays_2026 = {
              "2026-01-01", "2026-01-22", "2026-01-23", "2026-01-24", "2026-01-25",
              "2026-01-26", "2026-01-27", "2026-01-28", "2026-04-05", "2026-04-06",
              "2026-05-01", "2026-05-02", "2026-05-03", "2026-06-19", "2026-06-20",
              "2026-10-01", "2026-10-02", "2026-10-03", "2026-10-04", "2026-10-05",
              "2026-10-06", "2026-10-07"
          }

          if today in holidays_2026:
              print("今天节假日，不推送")
              sys.exit()

          stocks = [
              ("002446", "sz", "盛路通信"),
              ("000063", "sz", "中兴通讯"),
              ("603019", "sh", "中科曙光"),
              ("002156", "sz", "通富微电"),
              ("002463", "sz", "沪电股份"),
              ("600183", "sh", "生益科技"),
              ("600406", "sh", "国电南瑞"),
              ("600089", "sh", "特变电工"),
              ("002384", "sz", "东山精密"),
              ("601179", "sh", "中国西电")
          ]

          # =============== 获取最新公告（静默失败，不抛错） ===============
          def get_stock_news(code):
              try:
                  url = f"https://www.cninfo.com.cn/new/hisAnnouncement/query"
                  data = {"stock": code, "pageSize": 2, "pageNum": 1}
                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
                  r = requests.post(url, data=data, headers=headers, timeout=8)
                  data = r.json()
                  announcements = []
                  for ann in data.get("announcements", []):
                      title = ann.get("announcementTitle", "")
                      if len(title) > 5:
                          announcements.append(title)
                  return announcements[:2]
              except:
                  return []

          def judge_news_good_bad(title):
              good_key = ["预增", "扭亏", "盈利", "中标", "合同", "订单", "增持", "回购", "重组", "收购", "投产", "分红"]
              bad_key = ["亏损", "下降", "减持", "解禁", "立案", "处罚", "退市", "风险", "终止", "违约"]
              is_good = any(k in title for k in good_key)
              is_bad = any(k in title for k in bad_key)
              if is_good:
                  return "✅ 利好"
              elif is_bad:
                  return "❌ 利空"
              else:
                  return "ℹ️ 中性"

          # =============== 获取股票数据（静默失败，不抛错） ===============
          def get_stock_data(code, market, days=60):
              try:
                  symbol = f"{market}{code}"
                  end = now.strftime("%Y%m%d")
                  start = (now - timedelta(days=180)).strftime("%Y%m%d")
                  # 增加重试+延时
                  for i in range(3):
                      try:
                          df = ak.stock_zh_a_hist(symbol=symbol, period="daily", start_date=start, end_date=end, adjust="qfq")
                          if not df.empty and len(df) >= 30:
                              break
                          time.sleep(2)
                      except:
                          time.sleep(2)
                  if df.empty or len(df) < 30:
                      return None
                  df = df.rename(columns={
                      '日期':'date','开盘':'open','收盘':'close','最高':'high','最低':'low',
                      '成交量':'volume','成交额':'amount','换手率':'turnover'
                  })
                  df = df.tail(days).reset_index(drop=True)
                  return df
              except:
                  return None

          # =============== 主力成本 VWAP ===============
          def vwap_cost(df):
              try:
                  df = df.tail(20)
                  total_amount = df['amount'].sum()
                  total_volume = df['volume'].sum()
                  if total_volume <= 0:
                      return None
                  return round(total_amount / total_volume, 2)
              except:
                  return None

          # =============== 技术指标 ===============
          def indicators(df):
              close = df['close']
              volume = df['volume']
              df['ma5'] = ta.trend.sma_indicator(close, 5)
              df['ma10'] = ta.trend.sma_indicator(close, 10)
              df['ma20'] = ta.trend.sma_indicator(close, 20)
              macd = ta.trend.MACD(close)
              df['macd_line'] = macd.macd()
              df['macd_signal'] = macd.macd_signal()
              df['rsi'] = ta.momentum.rsi(close, 14)
              bb = ta.volatility.BollingerBands(close, 20, 2)
              df['bb_u'] = bb.bollinger_hband()
              df['bb_l'] = bb.bollinger_lband()
              df['vol_ma5'] = volume.rolling(5).mean()
              return df

          # =============== 生成报告 ===============
          output = f"📊 {today} 专业量化报告（全真实数据）%0A%0A"
          output += "✅ 真实K线 | 💎 主力成本 | 📢 公告利弊分析%0A%0A"

          for code, market, name in stocks:
              time.sleep(1)  # 增加延时防风控
              df = get_stock_data(code, market)
              news_list = get_stock_news(code)
              
              if df is None:
                  output += f"⚠️ {name} 获取失败%0A────────────────────%0A"
                  continue
              
              df = indicators(df)
              vwap = vwap_cost(df)
              d = df.iloc[-1]
              
              trend = "震荡"
              if d.close > d.ma5 > d.ma10 > d.ma20:
                  trend = "📈 多头排列"
              elif d.close < d.ma5 < d.ma10 < d.ma20:
                  trend = "📉 空头排列"
              
              macd_st = "震荡"
              if d.macd_line > d.macd_signal and df.iloc[-2].macd_line <= df.iloc[-2].macd_signal:
                  macd_st = "✅ 金叉"
              elif d.macd_line < d.macd_signal and df.iloc[-2].macd_line >= df.iloc[-2].macd_signal:
                  macd_st = "❌ 死叉"
              
              vol_st = "正常"
              if d.volume > d.vol_ma5 * 1.5:
                  vol_st = "🔥 放量"
              elif d.volume < d.vol_ma5 * 0.5:
                  vol_st = "📉 缩量"
              
              if trend == "📈 多头排列" and macd_st == "✅ 金叉":
                  long = "✅ 中长线：持股为主"
                  short = "✅ 短线：逢低关注"
              elif trend == "📉 空头排列" and macd_st == "❌ 死叉":
                  long = "❌ 中长线：谨慎观望"
                  short = "❌ 短线：回避风险"
              elif d.rsi < 30:
                  long = "💰 中长线：超跌机会"
                  short = "💰 短线：反弹可期"
              elif d.rsi > 70:
                  long = "⚠️ 中长线：高估风险"
                  short = "⚠️ 短线：逢高减仓"
              else:
                  long = "📊 中长线：持有观望"
                  short = "📊 短线：区间操作"
              
              output += f"🔹 {name} ({code})%0A"
              output += f"💰 收盘: {round(d.close,2)}%0A"
              output += f"📈 MA5:{round(d.ma5,2)} MA10:{round(d.ma10,2)} MA20:{round(d.ma20,2)}%0A"
              output += f"📊 趋势:{trend} | MACD:{macd_st} | RSI:{round(d.rsi,1)}%0A"
              output += f"🔋 量能:{vol_st}%0A"
              output += f"🛡️ 支撑:{round(d.bb_l,2)} | 阻力:{round(d.bb_u,2)}%0A"
              
              if vwap:
                  cost_st = "✅ 现价在主力成本之上" if d.close > vwap else "⚠️ 现价在主力成本之下"
                  output += f"💎 主力成本(VWAP): {vwap} | {cost_st}%0A"
              
              if news_list:
                  output += "📢 最新公告：%0A"
                  for title in news_list:
                      tag = judge_news_good_bad(title)
                      output += f"{tag}：{title}%0A"
              
              output += f"{long}%0A{short}%0A"
              output += "────────────────────%0A%0A"

          # 仅输出干净的 MSG= 行，避免错误日志混入
          print(f"MSG={output}")
          EOF

          # 安全写入环境变量：仅提取最后一行 MSG= 内容
          python3 analyze.py > output.log
          MSG=$(grep "^MSG=" output.log | head -1)
          echo "$MSG" >> $GITHUB_ENV

      - name: 推送微信
        if: env.MSG != ''
        run: |
          curl -s "https://sctapi.ftqq.com/${{ secrets.SCTKEY }}.send" \
          -d "title=📈 9:00 全真实量化+公告分析" \
          -d "desp=${MSG}"
